<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SERENDIPPO LiDAR Viewer — Tests</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: #111; color: #ccc; padding: 20px; }
    #map { width: 100%; height: 400px; margin-bottom: 20px; }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    h2 { font-size: 13px; font-weight: 600; margin: 16px 0 8px; }
    .pass { color: #4caf50; }
    .fail { color: #f44336; }
    .summary { margin-top: 16px; padding: 10px; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; }
    #results { list-style: none; padding: 0; }
    #results li { padding: 4px 0; font-size: 12px; }
    #results li::before { content: '— '; color: #666; }
  </style>
</head>
<body>
  <h1>SERENDIPPO LiDAR Viewer — Test Suite</h1>
  <div id="map"></div>
  <div class="summary" id="summary">Running...</div>
  <ul id="results"></ul>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.fullscreen@2.4.0/Control.FullScreen.js"></script>
  <script src="../js/namespace.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/constants.js"></script>
  <script src="../js/layers.js"></script>
  <script src="../js/layers/layerHelpers.js"></script>
  <script src="../js/layers/providerRegistry.js"></script>
  <script src="../js/layers/layerLabels.js"></script>
  <script src="../js/layers/layerGroups.js"></script>
  <script src="../js/layers/layerCache.js"></script>
  <script src="../js/providers/france.js"></script>
  <script src="../js/providers/dev.js"></script>
  <script src="../js/layers/providerFactory.js"></script>
  <script src="../js/map.js"></script>
  <script src="../js/sbs.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/bookmarks.js"></script>
  <script src="../js/ui/panels.js"></script>
  <script src="../js/ui/toolRegistry.js"></script>
  <script src="../js/ui/layerSelects.js"></script>
  <script src="../js/tools.js"></script>
  <script src="../js/measure.js"></script>
  <script src="../js/overlays.js"></script>
  <script src="../js/app.js"></script>

  <script>
    var results = [];
    var passed = 0, failed = 0;

    function test(name, fn) {
      try {
        fn();
        results.push('<span class="pass">PASS</span> ' + name);
        passed++;
      } catch(e) {
        results.push('<span class="fail">FAIL</span> ' + name + ': ' + e.message);
        failed++;
      }
    }

    // Attendre que Leaflet et LV soient prêts
    function runTests() {
      // ── 1. Namespace ──
      test('LV namespace exists', function() {
        if (typeof LV === 'undefined') throw new Error('LV is undefined');
      });

      test('LV.CONFIG exists', function() {
        if (!LV.CONFIG) throw new Error('LV.CONFIG missing');
        if (!LV.CONFIG.defaultView) throw new Error('defaultView missing');
      });

      test('LV.CONFIG has bookmarks', function() {
        if (!Array.isArray(LV.CONFIG.bookmarks)) throw new Error('bookmarks not array');
        if (LV.CONFIG.bookmarks.length === 0) throw new Error('bookmarks empty');
      });

      // ── 2. Constants ──
      test('LV.WMTS constants', function() {
        if (!LV.WMTS || !LV.WMTS.PM) throw new Error('WMTS.PM missing');
        if (!LV.WMTS.GMC) throw new Error('WMTS.GMC missing');
      });

      test('LV.URL constants', function() {
        if (!LV.URL || !LV.URL.IGN_WMTS) throw new Error('URL.IGN_WMTS missing');
        if (!LV.URL.OSM) throw new Error('URL.OSM missing');
      });

      test('LV.ATTR constants', function() {
        if (!LV.ATTR || !LV.ATTR.IGN_LIDAR) throw new Error('ATTR.IGN_LIDAR missing');
      });

      // ── 3. Map ──
      test('Map initialized', function() {
        if (!LV.map) throw new Error('LV.map is undefined');
        if (!LV.map.getCenter) throw new Error('LV.map not a Leaflet map');
      });

      test('Map has correct default view', function() {
        var c = LV.map.getCenter();
        var z = LV.map.getZoom();
        if (Math.abs(c.lat - 49.13412) > 0.01) throw new Error('Lat mismatch: ' + c.lat);
        if (Math.abs(c.lng - 6.12389) > 0.01) throw new Error('Lng mismatch: ' + c.lng);
        if (z !== 16) throw new Error('Zoom mismatch: ' + z);
      });

      test('Map panes exist', function() {
        if (!LV.map.getPane(LV.PANE_LEFT)) throw new Error('leftPane missing');
        if (!LV.map.getPane(LV.PANE_RIGHT)) throw new Error('rightPane missing');
        if (!LV.map.getPane(LV.PANE_OVERLAYS)) throw new Error('overlaysPane missing');
      });

      // ── 4. Providers ──
      test('LV.PROV_FR has France providers', function() {
        if (!LV.PROV_FR) throw new Error('PROV_FR missing');
        if (typeof LV.PROV_FR.lidar !== 'function') throw new Error('lidar not a function');
        if (typeof LV.PROV_FR.ortho !== 'function') throw new Error('ortho not a function');
      });

      test('LV.PROV_DEV has dev providers', function() {
        if (!LV.PROV_DEV) throw new Error('PROV_DEV missing');
        if (typeof LV.PROV_DEV.lidar_es !== 'function') throw new Error('lidar_es not a function');
        if (typeof LV.PROV_DEV.mdt_it !== 'function') throw new Error('mdt_it not a function');
      });

      test('createLayer returns layers', function() {
        var l = LV.createLayer('lidar');
        if (!l) throw new Error('createLayer("lidar") returned null');
        if (typeof l.addTo !== 'function') throw new Error('layer not a Leaflet layer');
      });

      test('createLayer returns null for unknown', function() {
        if (LV.createLayer('nonexistent') !== null) throw new Error('should return null');
      });

      // ── 5. Cache ──
      test('Layer cache exists', function() {
        if (!LV._sideCache) throw new Error('_sideCache missing');
        if (!LV._sideCache.left || !LV._sideCache.right) throw new Error('_sideCache sides missing');
      });

      test('getSideLayer returns cached layer', function() {
        var l1 = LV.getSideLayer('left', 'lidar');
        var l2 = LV.getSideLayer('left', 'lidar');
        if (l1 !== l2) throw new Error('getSideLayer not caching');
      });

      test('setLayerPane handles null', function() {
        LV.setLayerPane(null, LV.PANE_LEFT);
        // Should not throw
      });

      // ── 6. Layer groups ──
      test('LV.LAYER_GROUPS has groups', function() {
        if (!Array.isArray(LV.LAYER_GROUPS)) throw new Error('LAYER_GROUPS not array');
        if (LV.LAYER_GROUPS.length < 3) throw new Error('less than 3 groups');
      });

      test('LV.LAYER_NAMES has all keys', function() {
        var allKeys = LV.SELECTABLE_LAYERS;
        allKeys.forEach(function(k) {
          if (!LV.LAYER_NAMES[k]) throw new Error('Missing label for: ' + k);
        });
      });

      test('LV.SELECTABLE_LAYERS has all keys', function() {
        var flat = LV.LAYER_GROUPS.reduce(function(a, g) { return a.concat(g.keys); }, []);
        if (flat.length !== LV.SELECTABLE_LAYERS.length) throw new Error('SELECTABLE_LAYERS mismatch');
      });

      // ── 7. SBS ──
      test('SBS initialized', function() {
        if (!LV.SBS) throw new Error('SBS missing');
        if (typeof LV.SBS.updateClip !== 'function') throw new Error('updateClip not function');
      });

      test('SBS default pct = 50', function() {
        if (LV.SBS.pct !== 50) throw new Error('pct != 50: ' + LV.SBS.pct);
      });

      // ── 8. FormatCoord ──
      test('formatCoord formats correctly', function() {
        var s = LV.formatCoord({ lat: 48.8584, lng: 2.2945 });
        if (s.indexOf('48.85840') !== 0) throw new Error('Bad format: ' + s);
      });

      // ── 9. Bookmarks ──
      test('Bookmarks loaded', function() {
        if (!LV.Bookmarks) throw new Error('Bookmarks missing');
        if (!Array.isArray(LV.Bookmarks.list)) throw new Error('Bookmarks.list not array');
        if (LV.Bookmarks.list.length === 0) throw new Error('Bookmarks.list empty');
      });

      test('Bookmarks has default items', function() {
        var hasMet = LV.Bookmarks.list.some(function(b) { return b.id === 'metz'; });
        if (!hasMet) throw new Error('Default bookmark metz missing');
      });

      test('Bookmarks.save works', function() {
        LV.Bookmarks.save();
        var raw = localStorage.getItem(LV.Bookmarks.STORAGE_KEY);
        if (!raw) throw new Error('localStorage save failed');
      });

      // ── 10. Overlays ──
      test('OVERLAY_DEFS defined', function() {
        if (!LV.OVERLAY_DEFS) throw new Error('OVERLAY_DEFS missing');
        var keys = Object.keys(LV.OVERLAY_DEFS);
        if (keys.length < 4) throw new Error('Less than 4 overlay defs: ' + keys.length);
      });

      test('Overlay layers created', function() {
        Object.keys(LV.OVERLAY_DEFS).forEach(function(id) {
          if (!LV.OVERLAY_DEFS[id].layer) throw new Error('Overlay ' + id + ' layer not created');
        });
      });

      // ── 11. UI ──
      test('LV.UI exists', function() {
        if (!LV.UI) throw new Error('LV.UI missing');
        if (typeof LV.UI.isMobile !== 'function') throw new Error('isMobile not function');
        if (typeof LV.UI.togglePanel !== 'function') throw new Error('togglePanel not function');
      });

      test('LV.TOOLS has tool definitions', function() {
        var tools = ['btn-night', 'btn-geoloc', 'btn-bookmarks', 'btn-reset', 'btn-overlays', 'btn-marker'];
        tools.forEach(function(t) {
          if (!LV.TOOLS[t]) throw new Error('Tool missing: ' + t);
          if (typeof LV.TOOLS[t].on !== 'function') throw new Error('Tool ' + t + ' has no on()');
        });
      });

      test('LV.TOOLS.register works', function() {
        if (typeof LV.TOOLS.register !== 'function') throw new Error('register not function');
        // Should not throw for re-register
        LV.TOOLS.register('btn-night', { label: 'Test', on: function() {} });
      });

      // ── 12. Measure ──
      test('LV.Measure exists', function() {
        if (!LV.Measure) throw new Error('Measure missing');
        if (typeof LV.Measure.toggle !== 'function') throw new Error('toggle not function');
      });

      // ── 13. Pane constants ──
      test('Pane constants defined', function() {
        if (LV.PANE_LEFT !== 'leftPane') throw new Error('PANE_LEFT wrong');
        if (LV.PANE_RIGHT !== 'rightPane') throw new Error('PANE_RIGHT wrong');
        if (LV.PANE_OVERLAYS !== 'overlaysPane') throw new Error('PANE_OVERLAYS wrong');
      });

      // Afficher les résultats
      var el = document.getElementById('results');
      el.innerHTML = results.map(function(r) { return '<li>' + r + '</li>'; }).join('');

      var summary = document.getElementById('summary');
      var total = passed + failed;
      summary.innerHTML = '<strong>' + total + ' tests</strong> — ' +
        '<span class="pass">' + passed + ' passed</span>' +
        (failed > 0 ? ', <span class="fail">' + failed + ' failed</span>' : '');
      summary.style.borderColor = failed > 0 ? '#f44336' : '#4caf50';
    }

    // Attendre que LV.init soit terminé
    if (document.readyState === 'complete') {
      setTimeout(runTests, 500);
    } else {
      window.addEventListener('load', function() { setTimeout(runTests, 500); });
    }
  </script>
</body>
</html>
